<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid system example 2</title>
    <style>
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #eee;
            color: #222;
            font-size: 12pt;
            font-family: 'Courier New', Courier, monospace;
        }

        .teal {
            background-color: teal;
        }

        .slate-blue {
            background-color: slateblue;
        }

        .container {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 3fr;
            grid-template-rows: 1fr 6fr 1fr;
            gap: 10px;
            grid-template-areas: "header header" "aside content" "footer footer";
        }

        .header {
            grid-area: header;
        }

        .aside {
            grid-area: aside;
        }

        .content {
            grid-area: content;
        }

        .footer {
            grid-area: footer;
        }
    </style>
</head>

<body>
    <main class="container">
        <header class="header teal">
            Heading section
        </header>
        <aside class="aside teal">
            Side section
        </aside>
        <section class="content slate-blue">
            Content section
        </section>
        <footer class="footer teal">
            Footer section
        </footer>
    </main>
</body>

</html>
