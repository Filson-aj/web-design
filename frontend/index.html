<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid system</title>
    <style>
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        body {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <main class="container">
        <header class="header">
            Heading section
        </header>
        <aside class="aside">
            Aside section
        </aside>
        <section class="content">
            Content section
        </section>
        <footer class="footer">
            Footer section
        </footer>
    </main>
</body>

</html>
