<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Implement Dashboard using Grid</title>
    <style>
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        html {
            font-size: 10pt;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #eee;
            color: #000;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }

        .container {
            width: 100%;
            height: 100%;
            display: grid;
            gap: 10px;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 2fr 2fr 3fr 3fr 1fr;
        }

        .header {
            background-color: #f5f5f5;
            border-bottom: solid 1px rgba(128, 128, 128, 0.2);

        }

        .hero {}

        .aside {
            background-color: #f5f5f5;

        }

        .charts {}

        .distribution {}

        .footer {
            background-color: #f5f5f5;
            border-top: solid 1px rgba(128, 128, 128, 0.2);

        }

        .card {
            background-color: #f5f5f5;
            border: solid 1px rgba(128, 128, 128, 0.2);
            padding: 10px;
            box-shadow: 0 0 4px rgba(0, 0, 0, 0.4);
        }

        @media(min-width:1024px) {
            html {
                font-size: 14pt;
            }

            .container {
                grid-template-columns: 4fr 3fr 2fr;
                grid-template-rows: 1fr 2fr 3fr 1fr;
                grid-template-areas:
                    "header header aside"
                    "hero hero aside"
                    "distribution charts aside"
                    "footer footer aside";
            }

            .header {
                grid-area: header;

            }

            .hero {
                grid-area: hero;
            }

            .aside {
                grid-area: aside;

            }

            .charts {
                grid-area: charts;
            }

            .distribution {
                grid-area: distribution;
            }

            .footer {
                grid-area: footer;

            }

        }
    </style>
</head>

<body>
    <main class="container">
        <header class="header">
            heading section
        </header>

        <section class="hero card">
            This is the hero section
        </section>

        <aside class="aside card">
            side section
        </aside>

        <section class="charts card">
            Chart Section
        </section>

        <section class="distribution card">
            Distritution section
        </section>

        <footer class="footer">
            Footer section
        </footer>
    </main>
</body>

</html>
